name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET (10 preview)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Install wasm-tools
        run: dotnet workload install wasm-tools

      - name: Restore
        run: dotnet restore DeskUI.slnx

      - name: Build
        run: dotnet build DeskUI.slnx --configuration Release --no-restore

      - name: Publish WASM
        run: dotnet publish DeskUI.DemoWASM/DeskUI.DemoWASM.csproj -c Release -o build

      - name: Copy framework files
        run: cp -r DeskUI.DemoWASM/bin/Release/net10.0/wwwroot/_framework build/wwwroot/

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_SALMON_MUD_0C5967910 }}
          action: "upload"
          app_location: "build/wwwroot"
          skip_app_build: true
          app_build_command: "echo force-purge"

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_SALMON_MUD_0C5967910 }}
          action: "close"
