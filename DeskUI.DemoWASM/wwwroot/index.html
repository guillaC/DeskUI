<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DeskUI.DemoWASM</title>
    <base href="/" />

    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="DeskUI.DemoWASM.styles.css" />
    <link rel="stylesheet" href="_content/DeskUI.DemoRCL/desktop.css" />
    <link rel="stylesheet" href="_content/DeskUI/themes.css" />
    <link rel="icon" type="image/png" href="favicon.png" />

    <!-- Importmap vide (normal en mode legacy) -->
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>

    <!-- Boot Blazor .NET 10 en mode legacy + fingerprint -->
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>

    <script src="_content/DeskUI/drag.js"></script>
    <script src="_content/DeskUI.DemoRCL/themebuilder.js"></script>
</body>

</html>
